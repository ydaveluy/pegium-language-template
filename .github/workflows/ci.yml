name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run catches Pegium API drift even when the template itself
    # isn't touched.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-default:
    name: Build template (default name)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
      - name: Configure
        run: cmake -S . -B build -G Ninja
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Run CLI on sample
        run: ./build/mydsl-cli example/sample.mydsl

  build-renamed:
    name: Build template (after rename)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
      - name: Rename to mylang
        run: cmake -DLANGUAGE_NAME=mylang -P scripts/new-language.cmake
      - name: Configure
        run: cmake -S . -B build -G Ninja
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Run CLI on sample
        run: ./build/mylang-cli example/sample.mylang
